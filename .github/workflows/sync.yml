name: Push to Google Drive
on:
  push:
    branches:
      - main  # ⚠️ Note: If your default branch is called 'master', change 'main' to 'master'

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Archive project files into a zip
        run: zip -r project-backup.zip . -x "*.git*"

      - name: Upload Zip to Google Drive
        uses: mathisve/gdrive-upload-action@main
        with:
          filename: project-backup.zip
          name: project-backup.zip
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          encoded: false
          overwrite: true