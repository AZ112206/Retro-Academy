name: Push to Google Drive
on:
  push:
    branches:
      - main  # ⚠️ Note: If your default branch is called 'master', change 'main' to 'master'

jobs:
  sync-to-drive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Archive project files into a zip
        run: zip -r project-backup.zip . -x "*.git*" -x "node_modules/**"

      - name: Install Google Drive API client
        run: pip install --quiet google-api-python-client==2.198.0 google-auth==2.55.2

      - name: Upload Zip to Google Drive
        run: |
          python3 - <<'EOF'
          import os
          import re
          import json
          import sys
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.errors import HttpError
          from googleapiclient.http import MediaFileUpload

          credentials_json = os.environ.get('GDRIVE_CREDENTIALS')
          folder_id = os.environ.get('GDRIVE_FOLDER_ID', '').strip()
          filename = 'project-backup.zip'

          if not credentials_json:
              sys.exit('Error: GDRIVE_CREDENTIALS secret is not set.')
          if not folder_id:
              sys.exit('Error: GDRIVE_FOLDER_ID secret is not set.')
          if not os.path.exists(filename):
              sys.exit(f'Error: {filename} not found. The archive step may have failed.')

          # If GDRIVE_FOLDER_ID is a full Google Drive URL, extract just the folder ID.
          # Users sometimes copy the browser URL (e.g. https://drive.google.com/drive/folders/XXXXX)
          # instead of only the ID portion.
          url_match = re.search(r'/folders/([^/?]+)', folder_id)
          if url_match:
              folder_id = url_match.group(1)
              preview = folder_id[:min(6, len(folder_id))]
              print(f'Extracted folder ID from URL: {preview}...')

          # Use the full 'drive' scope so the service account can access
          # any folder shared with it, not just files it created itself.
          creds = service_account.Credentials.from_service_account_info(
              json.loads(credentials_json),
              scopes=['https://www.googleapis.com/auth/drive']
          )
          service = build('drive', 'v3', credentials=creds, cache_discovery=False)

          # Verify that the target folder is accessible before attempting any upload.
          # A 404 here means the folder ID is wrong or the service account lacks access.
          try:
              service.files().get(
                  fileId=folder_id,
                  supportsAllDrives=True,
                  fields='id,name'
              ).execute()
          except HttpError as e:
              if e.resp.status == 404:
                  print(
                      f'Warning: Google Drive folder "{folder_id}" was not found (HTTP 404) — upload skipped.\n'
                      'To fix this:\n'
                      '  1. Open Google Drive, right-click the target folder and choose "Share".\n'
                      '  2. Share it (Editor access) with the service-account email from GDRIVE_CREDENTIALS.\n'
                      '  3. Copy the folder ID from the URL (the part after /folders/) and update\n'
                      '     the GDRIVE_FOLDER_ID repository secret with that value.\n'
                      'If the folder was deleted, create a new one and repeat the steps above.',
                      file=sys.stderr,
                  )
                  sys.exit(0)
              print(
                  f'Error: Cannot access Google Drive folder "{folder_id}": {e}\n'
                  'Check that GDRIVE_FOLDER_ID is the folder ID (not the full URL) '
                  'and that the service account has been granted access to that folder.',
                  file=sys.stderr,
              )
              sys.exit(1)

          # Escape backslashes first, then single quotes, to produce a safe
          # Drive API query string (folder IDs are alphanumeric, but be defensive).
          safe_name = filename.replace("\\", "\\\\").replace("'", "\\'")
          safe_folder = folder_id.replace("\\", "\\\\").replace("'", "\\'")
          query = f"name = '{safe_name}' and '{safe_folder}' in parents and trashed = false"
          results = service.files().list(
              q=query,
              supportsAllDrives=True,
              includeItemsFromAllDrives=True,
              fields='files(id, name)'
          ).execute()
          existing = results.get('files', [])

          def create_file(svc, fname, parent_id):
              file_metadata = {'name': fname, 'parents': [parent_id]}
              media = MediaFileUpload(fname, mimetype='application/zip', resumable=True)
              try:
                  result = svc.files().create(
                      body=file_metadata,
                      media_body=media,
                      supportsAllDrives=True,
                      fields='id'
                  ).execute()
              except HttpError as e:
                  if e.resp.status == 404:
                      sys.exit(
                          f'Error: Cannot create file in folder "{parent_id}": {e}\n'
                          'The folder may have been deleted or the service account '
                          'may not have write access to it.'
                      )
                  raise
              print(f'Uploaded new file (id: {result.get("id")})')
              return result

          if existing:
              file_id = existing[0]['id']
              try:
                  media = MediaFileUpload(filename, mimetype='application/zip', resumable=True)
                  service.files().update(
                      fileId=file_id,
                      media_body=media,
                      supportsAllDrives=True
                  ).execute()
                  print(f'Updated existing file (id: {file_id})')
              except HttpError as e:
                  if e.resp.status == 404:
                      print(f'Warning: file {file_id} not found or cannot be updated (insufficient permissions); creating a new file instead.')
                      create_file(service, filename, folder_id)
                  else:
                      raise
          else:
              create_file(service, filename, folder_id)
          EOF
        env:
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}